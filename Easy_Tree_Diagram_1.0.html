<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Easy Tree Diagram">
    <title>Easy Tree Diagram</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --sidebar-width: 260px;
            --header-height: 108px;
            --branch-length: 40px;
            --tree-line: #c0c0c0;
            --accent: #007AFF;
            --border: #ebebeb;
            --bg: #fff;
            --bg-muted: #f7f7f7;
            --text: #1a1a1a;
            --text-muted: #888;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            display: flex;
            overflow: hidden;
            user-select: none;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-muted);
            border-right: 1px solid var(--border);
            position: fixed;
            left: calc(var(--sidebar-width) * -1);
            top: 0;
            transition: left 0.25s cubic-bezier(.4,0,.2,1);
            z-index: 3000;
            display: flex;
            flex-direction: column;
        }
        #sidebar.open { left: 0; }
        .sb-header {
            padding: 17px 15px;
            font-weight: 700; font-size: 14px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sb-close {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-muted); font-size: 18px;
            transition: background .15s;
        }
        .sb-close:hover { background: #e0e0e0; }
        .sb-controls {
            padding: 10px 11px;
            display: flex; flex-direction: column; gap: 6px;
            border-bottom: 1px solid var(--border);
        }
        .side-btn {
            padding: 9px 12px; border-radius: 7px;
            border: 1px solid var(--border); background: var(--bg);
            cursor: pointer; font-size: 13px; font-weight: 600;
            color: var(--text); text-align: center; transition: background .15s;
        }
        .side-btn:hover { background: #e5e5e5; }

        .sb-list { flex: 1; overflow-y: auto; padding: 6px 5px; }
        .deck-item {
            padding: 8px 10px; margin-bottom: 2px; border-radius: 7px;
            cursor: pointer; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
            color: var(--text-muted); transition: background .1s; position: relative;
        }
        .deck-item:hover { background: #e8e8e8; }
        .deck-item.active { background: var(--text); color: #fff; font-weight: 600; }
        .deck-item .item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
        /* Show full text while renaming (no ellipsis) */
        .deck-item .item-title[contenteditable="true"] {
            overflow: visible; white-space: normal;
            text-overflow: clip; word-break: break-all;
            background: rgba(0,122,255,.07); border-radius: 4px;
            padding: 1px 3px; outline: none;
        }
        .deck-item .del-btn { opacity: 0; font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; transition: opacity .15s; }
        .deck-item:hover .del-btn { opacity: 0.4; }
        .deck-item .del-btn:hover { opacity: 1 !important; }
        .deck-item.active .del-btn { opacity: 0.5; }
        .deck-item.active .del-btn:hover { opacity: 1; }
        .sb-drag-over { outline: 1.5px solid var(--accent); border-radius: 7px; }
        .sb-trash { border-top: 1px solid var(--border); background: var(--bg); }
        .trash-header {
            padding: 10px 14px; font-size: 11px; font-weight: 700;
            color: var(--text-muted); cursor: pointer; letter-spacing: .5px;
            display: flex; justify-content: space-between; align-items: center;
            text-transform: uppercase; transition: background .15s;
        }
        .trash-header:hover { background: #f0f0f0; }
        #trash-items { max-height: 160px; overflow-y: auto; padding: 0 7px 7px; }
        .trash-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 8px; border-radius: 6px; background: #fff5f5;
            margin-bottom: 3px; font-size: 12px; color: #c0392b;
        }
        .t-actions { display: flex; gap: 4px; }
        .t-btn {
            padding: 2px 6px; font-size: 10.5px; border-radius: 4px; cursor: pointer;
            background: transparent; border: 1px solid currentColor;
            opacity: .7; transition: opacity .15s;
        }
        .t-btn:hover { opacity: 1; }
        .t-btn.restore { color: #27ae60; }
        .t-btn.del { color: #c0392b; }

        /* ── MAIN ── */
        #main-wrapper {
            flex: 1; height: 100vh; overflow: auto;
            transition: margin-left .25s cubic-bezier(.4,0,.2,1);
            position: relative;
        }
        #main-wrapper.shifted { margin-left: var(--sidebar-width); }

        /* ── HEADER ── */
        #fixed-header {
            position: sticky; top: 0; left: 0;
            width: max-content; min-width: 100%;
            height: var(--header-height);
            background: rgba(255,255,255,.96);
            backdrop-filter: blur(12px);
            z-index: 2000; display: flex; flex-direction: column;
            border-bottom: 1px solid var(--border);
        }
        #top-toolbar {
            display: flex; align-items: center; gap: 5px;
            padding: 0 24px; height: 60px; flex-wrap: nowrap;
        }
        .hamburger {
            width: 34px; height: 34px; border-radius: 8px; border: none;
            background: none; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px; color: var(--text);
            flex-shrink: 0; transition: background .15s;
        }
        .hamburger:hover { background: var(--border); }
        .deck-title-input {
            font-size: 16px; font-weight: 700; border: none; outline: none;
            background: none; color: var(--text); flex: 1; min-width: 80px; padding: 0 6px;
        }
        .deck-title-input::placeholder { color: #ccc; font-weight: 400; }
        .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
        .tb-btn {
            padding: 0 11px; height: 30px; border: 1px solid var(--border);
            border-radius: 7px; background: var(--bg-muted); cursor: pointer;
            font-size: 12px; font-weight: 600; color: #555; white-space: nowrap;
            transition: all .15s; display: flex; align-items: center; gap: 3px; flex-shrink: 0;
        }
        .tb-btn:hover { background: #e5e5e5; border-color: #ccc; }
        .tb-btn.black { background: var(--text); color: #fff; border-color: transparent; }
        .tb-btn.black:hover { background: #333; }
        .tb-btn.hilite { color: #d35400; background: #fff8f0; border-color: #e67e22; font-weight: 900; }
        .tb-btn.hilite:hover { background: #fef0e0; }
        .tb-select {
            height: 30px; padding: 0 7px; border: 1px solid var(--border);
            border-radius: 7px; background: var(--bg-muted); cursor: pointer;
            font-size: 12px; font-weight: 600; color: #555; outline: none; flex-shrink: 0;
        }
        .tb-select:hover { background: #e5e5e5; }

        /* ── RULER ── */
        #header-ruler {
            display: flex; align-items: center; height: 48px;
            background: #fdfdfd; border-top: 1px solid #f0f0f0; padding-left: 24px;
        }
        .ruler-item {
            position: relative; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10.5px; color: #bbb; font-weight: 700;
            border-right: 1px solid #f0f0f0; box-sizing: border-box;
            flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase;
        }
        .ruler-resizer {
            position: absolute; right: -4px; top: 0;
            width: 8px; height: 100%; cursor: col-resize; z-index: 100;
        }
        .ruler-resizer:hover, .ruler-resizer.active { background: rgba(0,122,255,.25); }

        /* ── APP ── */
        #app {
            display: flex; flex-direction: column;
            padding: 24px 24px 80px 24px;
            min-width: max-content;
            min-height: calc(100vh - var(--header-height));
            position: relative;
        }

        /* ── NODES & CELLS ── */
        .node { display: flex; align-items: stretch; position: relative; margin-top: -1px; }
        .cell {
            position: relative; flex-shrink: 0;
            border: 1px solid var(--border);
            padding: 10px 12px; box-sizing: border-box;
            background: #fff; min-height: 48px;
            display: flex; flex-direction: column;
            transition: background .1s; overflow: visible;
        }
        .cell.active-cell { box-shadow: inset 0 0 0 2px var(--accent); z-index: 50; border-color: transparent; }
        .cell.selected-area { background: rgba(0,122,255,.06) !important; }
        .cell.dragging { opacity: .3; border: 2px dashed var(--accent) !important; background: #f0f7ff !important; }
        .cell.drag-over { background: rgba(0,122,255,.07) !important; border-color: var(--accent) !important; }
        .cell-content-wrapper { display: flex; flex-direction: column; width: 100%; }
        .cell-top-row { display: flex; align-items: flex-start; width: 100%; }

        /* Toggle button (▼) */
        .toggle-btn {
            width: 18px; height: 18px; flex-shrink: 0; margin-right: 5px; margin-top: 4px;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            transition: transform .2s ease; color: #bbb; font-size: 9px;
        }
        .cell.is-toggle .toggle-btn { display: flex; }
        .node.collapsed .toggle-btn { transform: rotate(-90deg); }

        /* Note area */
        .toggle-note {
            width: 100%; margin-top: 8px; padding: 10px 12px;
            background: rgba(0,0,0,.028); border-radius: 6px;
            font-size: 13.5px; color: #666; line-height: 1.65;
            outline: none; display: none; border: none;
            white-space: pre-wrap; word-break: break-all; box-sizing: border-box;
        }
        .cell.is-toggle .toggle-note { display: block; }
        .node.collapsed .toggle-note { display: none; }
        .node.collapsed > .children-container { display: none; }

        .input-area {
            flex: 1; border: none; outline: none; font-size: 15px;
            line-height: 1.55; white-space: pre-wrap; word-break: break-all; min-height: 24px;
        }
        .children-container { display: flex; flex-direction: column; flex-grow: 1; }

        /* ── ADD BUTTONS ── */
        .add-btn {
            position: absolute; width: 18px; height: 18px;
            background: rgba(0,0,0,.18); color: #fff; border: none;
            border-radius: 50%; font-size: 14px; line-height: 1;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; padding: 0; font-weight: bold;
            transition: background .15s;
        }
        .cell:hover .add-btn { display: flex; }
        .add-btn:hover { background: var(--accent) !important; }
        .add-top    { top: -9px;    left: 50%;  transform: translateX(-50%); }
        .add-bottom { bottom: -9px; left: 50%;  transform: translateX(-50%); }
        .add-left   { left: -9px;   top: 50%;   transform: translateY(-50%); }
        .add-right  { right: -9px;  top: 50%;   transform: translateY(-50%); }

        /* ── TREE MODE ── */
        #app.tree-mode .node { margin-top: 0; align-items: flex-start; }
        #app.tree-mode .cell { border: none !important; box-shadow: none !important; }

        /* Parent → Child horizontal line */
        #app.tree-mode .cell::after {
            content: ""; position: absolute;
            right: calc(var(--branch-length) * -.5 - 1px); top: 22px;
            width: calc(var(--branch-length) * .5 + 1px); height: 1px;
            background: var(--tree-line); display: none; z-index: 5;
        }
        #app.tree-mode .node:has(.children-container > .node) > .cell::after { display: block; }

        /* children-container */
        #app.tree-mode .children-container {
            margin-left: var(--branch-length);
            position: relative;
            align-self: flex-start;
        }
        #app.tree-mode .children-container > .node { position: relative; }

        /* Child ← horizontal connector */
        #app.tree-mode .children-container > .node::before {
            content: ""; position: absolute;
            left: calc(var(--branch-length) * -.5); top: 22px;
            width: calc(var(--branch-length) * .5); height: 1px;
            background: var(--tree-line); z-index: 5;
        }

        /* Vertical line (connects sibling nodes) */
        #app.tree-mode .children-container > .node::after {
            content: ""; position: absolute;
            left: calc(var(--branch-length) * -.5); top: 0; bottom: 0;
            width: 1px; background: var(--tree-line); z-index: 4;
        }
        /* First child: vertical line starts from cell center */
        #app.tree-mode .children-container > .node:first-child::after { top: 22px; }
        /* Last child: vertical line ends at cell center */
        #app.tree-mode .children-container > .node:last-child::after { height: 22px; bottom: auto; }
        /* Only child: hide vertical line (prevents T-tail) */
        #app.tree-mode .children-container > .node:only-child::after { display: none; }

        /* ── MARQUEE ── */
        #marquee {
            position: absolute; pointer-events: none; display: none; z-index: 1000;
            border: 1.5px solid var(--accent);
            background: rgba(0,122,255,.05);
        }

        /* ── WORD-STYLE COLOR PALETTE ── */
        .color-palette-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
        .color-palette-dropdown {
            display: none; position: absolute;
            top: calc(100% + 6px); left: 0;
            background: #fff; border: 1px solid #ddd;
            border-radius: 10px; padding: 12px 12px;
            box-shadow: 0 8px 28px rgba(0,0,0,.15);
            z-index: 9000; width: 216px;
        }
        .color-palette-wrap.open .color-palette-dropdown { display: block; }
        .palette-label {
            font-size: 10px; font-weight: 700; color: #aaa;
            letter-spacing: .8px; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .palette-grid {
            display: grid; grid-template-columns: repeat(9, 1fr);
            gap: 3px; margin-bottom: 10px; width: 100%;
        }
        .palette-swatch {
            width: 18px; height: 18px; border-radius: 3px;
            cursor: pointer; border: 1px solid rgba(0,0,0,.08);
            transition: box-shadow .1s;
        }
        .palette-swatch:hover {
            box-shadow: 0 0 0 2px var(--accent);
            z-index: 1; position: relative;
        }
        .palette-divider { border: none; border-top: 1px solid #f0f0f0; margin: 8px 0; }
        .palette-custom {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 12px; color: #555;
            padding: 5px 2px; border-radius: 6px; transition: background .12s;
        }
        .palette-custom:hover { background: #f5f5f5; color: #111; }
        .palette-custom-circle {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid #ccc; overflow: hidden; flex-shrink: 0;
            background: conic-gradient(red,#ff0,lime,cyan,blue,#f0f,red);
            position: relative;
        }
        .palette-custom-circle input[type=color] {
            opacity: 0; position: absolute; inset: 0;
            width: 100%; height: 100%; cursor: pointer; border: none; padding: 0;
        }

        /* ── CONTEXT MENU ── */
        #ctx-menu {
            position: fixed; background: #fff;
            border: 1px solid #e0e0e0; border-radius: 9px;
            box-shadow: 0 6px 20px rgba(0,0,0,.13);
            padding: 4px; z-index: 99999; display: none; min-width: 140px;
            user-select: none;
        }
        .ctx-item {
            padding: 8px 14px; font-size: 13px; border-radius: 6px;
            cursor: pointer; color: #222; transition: background .1s;
            white-space: nowrap; font-weight: 500;
        }
        .ctx-item:hover { background: #f0f0f0; }
        .ctx-item.danger { color: #e74c3c; }
        .ctx-item.danger:hover { background: #fff0ee; }

        /* ── MODAL ── */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.4);
            display: none; justify-content: center; align-items: center; z-index: 9000;
        }
        .modal-box {
            background: #fff; padding: 26px 24px 20px; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.15); width: 290px; text-align: center;
        }
        .modal-msg { font-size: 14.5px; font-weight: 600; line-height: 1.55; color: var(--text); margin-bottom: 18px; white-space: pre-line; }
        .modal-actions { display: flex; gap: 8px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 9px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; transition: all .15s; }
        .m-btn.cancel { background: var(--bg-muted); color: var(--text); }
        .m-btn.cancel:hover { background: #e5e5e5; }
        .m-btn.confirm { background: var(--text); color: #fff; }
        .m-btn.confirm:hover { background: #333; }

        /* ── PRINT ── */
        @media print {
            #sidebar, #fixed-header { display: none !important; }
            #main-wrapper { margin-left: 0 !important; overflow: visible !important; height: auto !important; }
            #app { padding: 20px !important; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="ctx-menu">
    <div class="ctx-item" onclick="ctxRename()">Rename</div>
    <div class="ctx-item danger" onclick="ctxDelete()">Delete</div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
        <div class="modal-msg" id="modal-msg"></div>
        <div class="modal-actions" id="modal-actions"></div>
    </div>
</div>

<div id="sidebar">
    <div class="sb-header">
        <span>Workspace</span>
        <span class="sb-close" onclick="toggleSidebar()">×</span>
    </div>
        <div class="sb-controls">
            <div class="side-btn" onclick="addNewItem('folder')">New Folder</div>
            <div class="side-btn" onclick="addNewItem('file')">New File</div>
        </div>
    <div class="sb-list" id="sidebar-list"></div>
    <div class="sb-trash">
        <div class="trash-header" onclick="toggleTrash()">
            <span>Trash</span>
            <span id="trash-count">0</span>
        </div>
        <div id="trash-items" style="display:none;"></div>
    </div>
</div>

<div id="main-wrapper">
    <div id="fixed-header">
        <div id="top-toolbar">
            <button class="hamburger" onclick="toggleSidebar()">≡</button>
            <input type="text" id="title-input" class="deck-title-input" placeholder="File title" oninput="renameFile(this.value)">
            <div class="tb-sep"></div>
            <button class="tb-btn" onclick="undo()" title="Undo (Ctrl+Z)">⤺</button>
            <button class="tb-btn" onclick="redo()" title="Redo (Ctrl+Y)">⤻</button>
            <div class="tb-sep"></div>
            <select class="tb-select" id="font-size-select" onchange="applyFontSize(this.value)" style="width:68px;" title="Font size">
                <option value="">Size</option>
                <option value="1">10px</option>
                <option value="2">13px</option>
                <option value="3">16px</option>
                <option value="4">18px</option>
                <option value="5">24px</option>
                <option value="6">32px</option>
                <option value="7">48px</option>
            </select>
            <button class="tb-btn" onclick="execCmd('bold')"><b>B</b></button>
            <button class="tb-btn" onclick="execCmd('italic')"><i>I</i></button>
            <button class="tb-btn" onclick="execCmd('strikethrough')"><s>S</s></button>
            <div class="color-palette-wrap" id="colorPaletteWrap">
                <button class="tb-btn hilite" onclick="togglePalette(event)">H</button>
                <div class="color-palette-dropdown" id="colorPaletteDropdown">
                    <div class="palette-label">Theme Colors</div>
                    <div class="palette-grid" id="paletteTheme"></div>
                    <hr class="palette-divider">
                    <div class="palette-label">Standard Colors</div>
                    <div class="palette-grid" id="paletteStd"></div>
                    <hr class="palette-divider">
                    <div class="palette-custom" onclick="document.getElementById('customColorNative').click()">
                        <div class="palette-custom-circle">
                            <input type="color" id="customColorNative" onchange="applyHighlight(this.value)" onclick="event.stopPropagation()">
                        </div>
                        <span>Custom color...</span>
                    </div>
                </div>
            </div>
            <div class="tb-sep"></div>
            <select class="tb-select" id="style-select" onchange="changeStyle(this.value)">
                <option value="dashed">Dashed</option>
                <option value="solid">Solid</option>
                <option value="tree">Tree</option>
            </select>
            <div class="tb-sep"></div>
            <button class="tb-btn" onclick="window.print()">PDF</button>
            <button class="tb-btn" onclick="saveAsPNG()">PNG</button>
            <button class="tb-btn" onclick="exportJSON()">Backup</button>
            <button class="tb-btn" onclick="document.getElementById('import-file').click()">Import</button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importJSON(event)">
            <button class="tb-btn" id="pwa-install-btn" style="display:none;" onclick="pwsInstall()">📲 Install App</button>
        </div>
        <div id="header-ruler"></div>
    </div>
    <div id="app" onmousedown="onAppMouseDown(event)">
        <div id="marquee"></div>
    </div>
</div>

<script>
// ================================================================
//  STATE
// ================================================================
let fileSystem = [];
let trashBin = [];
let currentFileId = null;
let colWidths = {};
let currentStyle = 'dashed';
let selectedCells = new Set();
let historyStack = [];
let redoStack = [];
let draggedSidebarId = null;
let draggedNode = null;
const STORAGE = 'logicArch_final_v1';

// ================================================================
//  INIT
// ================================================================
function init() {
    const saved = localStorage.getItem(STORAGE);
    const savedTrash = localStorage.getItem(STORAGE + '_trash');
    if (saved) try { fileSystem = JSON.parse(saved); } catch(e) {}
    if (savedTrash) try { trashBin = JSON.parse(savedTrash); } catch(e) {}
    if (!fileSystem.length) addNewItem('file', 'New File');
    else {
        const first = findFirstFile(fileSystem);
        if (first) loadFile(first.id); else addNewItem('file', 'New File');
    }
    renderSidebar();
    renderTrash();
    initPalette();
    document.addEventListener('keydown', handleGlobalKey);
    document.addEventListener('mousedown', e => {
        if (!e.target.closest('.cell') && !e.target.closest('#fixed-header') &&
            !e.target.closest('#sidebar') && !e.target.closest('#colorPaletteWrap') &&
            !e.target.closest('#modal-overlay')) clearSelection();
    });
    initPWA();
}

// ================================================================
//  FILE SYSTEM  CRUD
// ================================================================
function addNewItem(type, title) {
    const item = {
        id: Date.now().toString() + Math.random().toString(36).slice(2,6),
        type,
        title: title || (type === 'file' ? 'New File' : 'New Folder'),
        collapsed: false
    };
    if (type === 'file') { item.data = []; item.widths = {}; item.style = 'dashed'; }
    else { item.children = []; }
    fileSystem.push(item);
    persist();
    renderSidebar();
    if (type === 'file') loadFile(item.id);
}

function findItem(id, items = fileSystem) {
    for (const it of items) {
        if (it.id === id) return it;
        if (it.children) { const f = findItem(id, it.children); if (f) return f; }
    }
    return null;
}

function findFirstFile(items) {
    for (const it of items) {
        if (it.type === 'file') return it;
        if (it.children) { const f = findFirstFile(it.children); if (f) return f; }
    }
    return null;
}

function removeItemById(id, items = fileSystem) {
    const idx = items.findIndex(i => i.id === id);
    if (idx > -1) { items.splice(idx, 1); return true; }
    for (const it of items) { if (it.children && removeItemById(id, it.children)) return true; }
    return false;
}

function handleDeleteItem(id) {
    const item = findItem(id);
    if (!item) return;
    showModal(`Move "${item.title}" to Trash?`, [
        { label: 'Cancel', cls: 'cancel', fn: closeModal },
        { label: 'Move', cls: 'confirm', fn: () => {
            closeModal();
            trashBin.push(JSON.parse(JSON.stringify(item)));
            removeItemById(id);
            persist();
            if (currentFileId === id) {
                const first = findFirstFile(fileSystem);
                if (first) loadFile(first.id);
                else { currentFileId = null; getApp().innerHTML = '<div id="marquee"></div>'; document.getElementById('header-ruler').innerHTML = ''; document.getElementById('title-input').value = ''; }
            }
            renderSidebar();
            renderTrash();
        }}
    ]);
}

function renameFile(t) {
    const item = findItem(currentFileId);
    if (item) { item.title = t; persist(); renderSidebar(); }
}

function loadFile(id) {
    const item = findItem(id);
    if (!item || item.type !== 'file') return;
    currentFileId = id;
    document.getElementById('title-input').value = item.title;
    colWidths = item.widths ? { ...item.widths } : {};
    currentStyle = item.style || 'dashed';
    document.getElementById('style-select').value = currentStyle;
    const app = getApp();
    app.innerHTML = '<div id="marquee"></div>';
    if (item.data && item.data.length) item.data.forEach(n => app.appendChild(rebuildNode(n)));
    else app.appendChild(createNode(0));
    applyStyleToAll(false);
    updateRuler();
    renderSidebar();
}

function autoSave() {
    const item = findItem(currentFileId);
    if (!item) return;
    item.data = Array.from(getApp().querySelectorAll(':scope > .node')).map(serializeNode);
    item.widths = { ...colWidths };
    item.style = currentStyle;
    persist();
}

function persist() {
    localStorage.setItem(STORAGE, JSON.stringify(fileSystem));
    localStorage.setItem(STORAGE + '_trash', JSON.stringify(trashBin));
}

function serializeNode(node) {
    return {
        content: node.querySelector('.input-area').innerHTML,
        note: node.querySelector('.toggle-note').innerHTML,
        depth: parseInt(node.dataset.depth),
        collapsed: node.classList.contains('collapsed'),
        isToggle: node.querySelector('.cell').classList.contains('is-toggle'),
        children: Array.from(node.querySelector('.children-container').children).map(serializeNode)
    };
}

function rebuildNode(n) {
    const node = createNode(n.depth || 0, n.content || '', n.note || '', !!n.collapsed, !!n.isToggle);
    (n.children || []).forEach(c => node.querySelector('.children-container').appendChild(rebuildNode(c)));
    return node;
}

// ================================================================
//  SIDEBAR RENDER
// ================================================================
function renderSidebar(items = fileSystem, container = document.getElementById('sidebar-list'), depth = 0) {
    if (depth === 0) container.innerHTML = '';
    items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'deck-item' + (item.id === currentFileId ? ' active' : '');
        el.style.paddingLeft = (depth * 18 + 10) + 'px';
        el.draggable = true;
        el.dataset.id = item.id;
        const icon = item.type === 'folder' ? (item.collapsed ? '▶' : '▼') : '';
        el.innerHTML = `<span style="font-size:12px;flex-shrink:0">${icon}</span><span class="item-title">${item.title}</span><span class="del-btn" title="Delete">×</span>`;
        el.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); handleDeleteItem(item.id); });
        el.addEventListener('click', e => {
            if (e.target.classList.contains('del-btn')) return;
            if (item.type === 'folder') { item.collapsed = !item.collapsed; persist(); renderSidebar(); }
            else loadFile(item.id);
        });
        el.addEventListener('dblclick', e => {
            e.stopPropagation();
            startInlineRename(item.id);
        });
        el.addEventListener('dragstart', e => { draggedSidebarId = item.id; e.stopPropagation(); });
        el.addEventListener('contextmenu', e => showCtxMenu(e, item.id));
        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('sb-drag-over'); });
        el.addEventListener('dragleave', () => el.classList.remove('sb-drag-over'));
        el.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation(); el.classList.remove('sb-drag-over');
            moveSidebarItem(draggedSidebarId, item.id);
        });
        container.appendChild(el);
        if (item.type === 'folder' && !item.collapsed && item.children) renderSidebar(item.children, container, depth + 1);
    });
}

function moveSidebarItem(srcId, targetId) {
    if (srcId === targetId) return;
    const src = JSON.parse(JSON.stringify(findItem(srcId)));
    const target = findItem(targetId);
    if (!src || !target) return;
    removeItemById(srcId);
    if (target.type === 'folder') { if (!target.children) target.children = []; target.children.push(src); }
    else fileSystem.push(src);
    persist();
    renderSidebar();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('main-wrapper').classList.toggle('shifted');
}

// ================================================================
//  TRASH
// ================================================================
function toggleTrash() {
    const el = document.getElementById('trash-items');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function renderTrash() {
    const el = document.getElementById('trash-items');
    document.getElementById('trash-count').textContent = trashBin.length;
    el.innerHTML = '';
    trashBin.forEach(item => {
        const div = document.createElement('div');
        div.className = 'trash-item';
        div.innerHTML = `
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.title}</span>
            <div class="t-actions">
                <button class="t-btn restore" onclick="restoreTrash('${item.id}')">Restore</button>
                <button class="t-btn del" onclick="deleteForever('${item.id}')">Delete</button>
            </div>`;
        el.appendChild(div);
    });
}

function restoreTrash(id) {
    const idx = trashBin.findIndex(i => i.id === id);
    if (idx > -1) { fileSystem.push(trashBin.splice(idx, 1)[0]); persist(); renderSidebar(); renderTrash(); }
}

function deleteForever(id) {
    showModal('Permanently delete?\nThis cannot be undone.', [
        { label: 'Cancel', cls: 'cancel', fn: closeModal },
        { label: 'Delete Forever', cls: 'confirm', fn: () => { closeModal(); trashBin = trashBin.filter(i => i.id !== id); persist(); renderTrash(); }}
    ]);
}

// ================================================================
//  NODE CREATION
// ================================================================
function createNode(depth = 0, content = '', note = '', collapsed = false, isToggle = false) {
    const node = document.createElement('div');
    node.className = 'node' + (collapsed ? ' collapsed' : '');
    node.dataset.depth = depth;

    const cell = document.createElement('div');
    cell.className = 'cell' + (isToggle ? ' is-toggle' : '');
    cell.style.width = (colWidths[depth] || 250) + 'px';
    cell.draggable = true;
    setCellBorder(cell);

    // Content wrapper
    const cw = document.createElement('div'); cw.className = 'cell-content-wrapper';
    const tr = document.createElement('div'); tr.className = 'cell-top-row';

    // Toggle btn
    const toggleBtn = document.createElement('div');
    toggleBtn.className = 'toggle-btn';
    toggleBtn.innerHTML = '▼';
    toggleBtn.addEventListener('click', e => { e.stopPropagation(); node.classList.toggle('collapsed'); autoSave(); });

    // Input
    const input = document.createElement('div');
    input.className = 'input-area';
    input.contentEditable = 'true';
    input.innerHTML = content;

    // Note area
    const noteArea = document.createElement('div');
    noteArea.className = 'toggle-note';
    noteArea.contentEditable = 'true';
    noteArea.innerHTML = note;
    noteArea.addEventListener('input', autoSave);
    noteArea.addEventListener('focus', () => { cell.draggable = false; });
    noteArea.addEventListener('blur', () => { cell.draggable = true; });

    // Input events
    input.addEventListener('input', () => {
        // Activate toggle only on '> ' (angle bracket + space) input
        if (/^>\s/.test(input.innerText)) {
            input.innerText = input.innerText.replace(/^>\s/, '');
            cell.classList.add('is-toggle');
            cursorToEnd(input);
            noteArea.focus();
        }
        autoSave();
    });

    input.addEventListener('keydown', e => {
        if (e.isComposing) return;
        if (e.key === 'Backspace') {
            const sel = window.getSelection();
            if (sel.rangeCount && sel.getRangeAt(0).startOffset === 0 && cell.classList.contains('is-toggle')) {
                e.preventDefault(); cell.classList.remove('is-toggle'); noteArea.innerHTML = ''; autoSave(); return;
            }
            if (!input.innerText.trim()) { e.preventDefault(); deleteNode(node); return; }
        }
        if (e.key === 'Tab') { e.preventDefault(); addNode(node, 'right'); }
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addNode(node, 'bottom'); }
    });

    input.addEventListener('focus', () => { clearSelection(); cell.classList.add('active-cell'); selectedCells.add(cell); });

    // Cell click — select only, do not move cursor
    cell.addEventListener('click', e => {
        e.stopPropagation();
        if (!e.target.closest('.add-btn') && !e.target.closest('.toggle-btn')) {
            if (!e.ctrlKey) clearSelection();
            cell.classList.add('active-cell');
            selectedCells.add(cell);
            // Do not force focus to input when clicking the note area
            if (!e.target.closest('.toggle-note') && document.activeElement !== input) {
                input.focus();
            }
        }
    });

    // Drag & drop
    cell.addEventListener('dragstart', e => {
        draggedNode = node;
        setTimeout(() => cell.classList.add('dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
        e.stopPropagation();
    });
    cell.addEventListener('dragend', () => {
        cell.classList.remove('dragging');
        document.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    cell.addEventListener('dragover', e => {
        e.preventDefault();
        if (!draggedNode || draggedNode === node || draggedNode.contains(node)) return;
        document.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));
        cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        cell.classList.remove('drag-over');
        if (!draggedNode || draggedNode === node || draggedNode.contains(node)) return;
        saveState();
        const rect = cell.getBoundingClientRect();
        const relX = e.clientX - rect.left;
        if (relX > rect.width * 0.75) {
            node.querySelector('.children-container').appendChild(draggedNode);
            updateDepths(draggedNode, depth + 1);
        } else {
            node.parentNode.insertBefore(draggedNode, node);
            updateDepths(draggedNode, depth);
        }
        autoSave(); updateRuler();
    });

    // Assemble
    tr.append(toggleBtn, input);
    cw.append(tr, noteArea);
    cell.append(cw);

    // + buttons
    ['top','bottom','left','right'].forEach(pos => {
        const b = document.createElement('button');
        b.className = `add-btn add-${pos}`;
        b.innerText = '+';
        b.addEventListener('click', e => { e.stopPropagation(); addNode(node, pos); });
        cell.appendChild(b);
    });

    const children = document.createElement('div');
    children.className = 'children-container';
    node.append(cell, children);
    return node;
}

function setCellBorder(cell) {
    if (currentStyle === 'tree' || currentStyle === 'none') cell.style.borderRight = 'none';
    else cell.style.borderRight = `1px ${currentStyle} #ccc`;
}

function cursorToEnd(el) {
    if (!el.isContentEditable) return;
    const r = document.createRange(); const s = window.getSelection();
    r.selectNodeContents(el); r.collapse(false); s.removeAllRanges(); s.addRange(r);
}

function getApp() { return document.getElementById('app'); }

// ================================================================
//  NODE OPERATIONS
// ================================================================
function addNode(refNode, pos) {
    saveState();
    const d = parseInt(refNode.dataset.depth);
    let newNode;
    if (pos === 'right') { newNode = createNode(d + 1); refNode.querySelector('.children-container').appendChild(newNode); }
    else if (pos === 'bottom') { newNode = createNode(d); refNode.after(newNode); }
    else if (pos === 'top') { newNode = createNode(d); refNode.before(newNode); }
    else if (pos === 'left') { newNode = createNode(Math.max(0, d - 1)); refNode.before(newNode); }
    if (newNode) { newNode.querySelector('.input-area').focus(); autoSave(); updateRuler(); }
}

function deleteNode(node) {
    const app = getApp();
    if (app.querySelectorAll('.node').length <= 1) {
        node.querySelector('.input-area').innerHTML = '';
        node.querySelector('.toggle-note').innerHTML = '';
        node.querySelector('.cell').classList.remove('is-toggle');
        return;
    }
    saveState();
    const d = parseInt(node.dataset.depth);
    Array.from(node.querySelector('.children-container').children)
        .forEach(c => { node.parentNode.insertBefore(c, node); updateDepths(c, d); });
    node.remove();
    autoSave(); updateRuler();
}

function deleteSelected() {
    if (!selectedCells.size) return;
    const nodes = Array.from(selectedCells).map(c => c.parentElement).filter(Boolean);
    const app = getApp();
    if (app.querySelectorAll('.node').length <= nodes.length) return;
    saveState();
    nodes.forEach(node => {
        if (!node || !node.parentNode) return;
        const d = parseInt(node.dataset.depth);
        Array.from(node.querySelector('.children-container').children)
            .forEach(c => { node.parentNode.insertBefore(c, node); updateDepths(c, d); });
        node.remove();
    });
    clearSelection(); autoSave(); updateRuler();
}

function updateDepths(node, d) {
    node.dataset.depth = d;
    const cell = node.querySelector('.cell');
    if (cell) { cell.style.width = (colWidths[d] || 250) + 'px'; setCellBorder(cell); }
    Array.from(node.querySelector('.children-container').children).forEach(c => updateDepths(c, d + 1));
}

// ================================================================
//  RULER
// ================================================================
function updateRuler() {
    const ruler = document.getElementById('header-ruler');
    ruler.innerHTML = '';
    let maxD = 0;
    document.querySelectorAll('.node').forEach(n => maxD = Math.max(maxD, parseInt(n.dataset.depth)));
    for (let i = 0; i <= maxD; i++) {
        const item = document.createElement('div');
        item.className = 'ruler-item';
        const w = colWidths[i] || 250;
        item.style.width = w + 'px';
        item.textContent = i + 1;
        const resizer = document.createElement('div');
        resizer.className = 'ruler-resizer';
        let startX = 0;
        resizer.addEventListener('mousedown', e => {
            e.stopPropagation(); startX = e.clientX;
            const startW = colWidths[i] || 250;
            resizer.classList.add('active');
            document.onmousemove = m => {
                const nW = Math.max(60, startW + (m.clientX - startX));
                colWidths[i] = nW; item.style.width = nW + 'px';
                document.querySelectorAll(`.node[data-depth="${i}"] > .cell`).forEach(c => c.style.width = nW + 'px');
            };
            document.onmouseup = () => { document.onmousemove = null; resizer.classList.remove('active'); autoSave(); };
        });
        item.appendChild(resizer);
        ruler.appendChild(item);
    }
}

// ================================================================
//  STYLE
// ================================================================
function changeStyle(v, save = true) {
    currentStyle = v;
    document.getElementById('style-select').value = v;
    applyStyleToAll(save);
}

function applyStyleToAll(save = true) {
    const app = getApp();
    if (currentStyle === 'tree') app.classList.add('tree-mode');
    else app.classList.remove('tree-mode');
    document.querySelectorAll('.cell').forEach(setCellBorder);
    if (save) autoSave();
}

// ================================================================
//  HISTORY
// ================================================================
function saveState() {
    historyStack.push(JSON.stringify(fileSystem));
    if (historyStack.length > 60) historyStack.shift();
    redoStack = [];
}
function undo() {
    if (!historyStack.length) return;
    redoStack.push(JSON.stringify(fileSystem));
    fileSystem = JSON.parse(historyStack.pop());
    persist();
    if (currentFileId) loadFile(currentFileId);
}
function redo() {
    if (!redoStack.length) return;
    historyStack.push(JSON.stringify(fileSystem));
    fileSystem = JSON.parse(redoStack.pop());
    persist();
    if (currentFileId) loadFile(currentFileId);
}

// ================================================================
//  SELECTION & MARQUEE
// ================================================================
function clearSelection() {
    selectedCells.forEach(c => c.classList.remove('active-cell', 'selected-area'));
    selectedCells.clear();
}

let mqX0, mqY0, mqActive = false;

function onAppMouseDown(e) {
    if (e.button !== 0 || e.target.closest('.cell') || e.target.closest('#fixed-header') ||
        e.target.closest('#sidebar') || e.target.closest('#colorPaletteWrap') || e.target.closest('#modal-overlay')) return;
    const app = getApp();
    const rect = app.getBoundingClientRect();
    mqX0 = e.clientX - rect.left + document.getElementById('main-wrapper').scrollLeft;
    mqY0 = e.clientY - rect.top  + document.getElementById('main-wrapper').scrollTop;
    clearSelection();
    mqActive = true;
    const m = document.getElementById('marquee');
    m.style.cssText = `display:block; left:${mqX0}px; top:${mqY0}px; width:0; height:0;`;
    document.addEventListener('mousemove', onMarqueeDrag);
    document.addEventListener('mouseup', onMarqueeEnd);
}

function onMarqueeDrag(e) {
    if (!mqActive) return;
    const app = getApp();
    const rect = app.getBoundingClientRect();
    const scroll = document.getElementById('main-wrapper');
    const cx = e.clientX - rect.left + scroll.scrollLeft;
    const cy = e.clientY - rect.top  + scroll.scrollTop;
    const l = Math.min(mqX0, cx), t = Math.min(mqY0, cy);
    const w = Math.abs(cx - mqX0), h = Math.abs(cy - mqY0);
    const m = document.getElementById('marquee');
    m.style.left = l+'px'; m.style.top = t+'px'; m.style.width = w+'px'; m.style.height = h+'px';
    const mb = m.getBoundingClientRect();
    document.querySelectorAll('.cell').forEach(cell => {
        const r = cell.getBoundingClientRect();
        const over = !(mb.right<r.left || mb.left>r.right || mb.bottom<r.top || mb.top>r.bottom);
        if (over) { cell.classList.add('selected-area'); selectedCells.add(cell); }
        else { cell.classList.remove('selected-area'); selectedCells.delete(cell); }
    });
}

function onMarqueeEnd() {
    mqActive = false;
    const m = document.getElementById('marquee'); if (m) m.style.display = 'none';
    document.removeEventListener('mousemove', onMarqueeDrag);
    document.removeEventListener('mouseup', onMarqueeEnd);
}

// ================================================================
//  KEYBOARD
// ================================================================
function handleGlobalKey(e) {
    const editing = document.activeElement.classList.contains('input-area') || document.activeElement.classList.contains('toggle-note');
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); return; }
    if ((e.key === 'Backspace' || e.key === 'Delete') && !editing && selectedCells.size > 0) {
        e.preventDefault(); deleteSelected();
    }
}

function execCmd(cmd) { document.execCommand(cmd, false, null); autoSave(); }

async function saveAsPNG() {
    const app = getApp();
    // High-quality export: scale set to 4 for crisp PNG output
    const canvas = await html2canvas(app, { 
        backgroundColor: '#fff', 
        scale: 4, 
        useCORS: true 
    });
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `${findItem(currentFileId)?.title || 'logicarch'}.png`;
    a.click();
}

function exportJSON() {
    const blob = new Blob([JSON.stringify({ fileSystem, trashBin })], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_${Date.now()}.json`;
    a.click();
}

function importJSON(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (data.fileSystem) {
                fileSystem = data.fileSystem;
                trashBin = data.trashBin || [];
                persist();
                const first = findFirstFile(fileSystem);
                if (first) loadFile(first.id);
                renderSidebar(); renderTrash();
                showModal('Data imported successfully! ✅', [{ label: 'OK', cls: 'confirm', fn: closeModal }]);
            }
        } catch (err) {
            showModal('Could not read the file.', [{ label: 'OK', cls: 'confirm', fn: closeModal }]);
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ================================================================
//  WORD-STYLE COLOR PALETTE
// ================================================================
const PALETTE_THEME = [
    '#ffffff','#9e9e9e','#ffcccc','#ffe4cc','#fffacc','#ccffcc','#cce4ff','#ccd4f0','#eeccff',
    '#f0f0f0','#616161','#ff9999','#ffbb88','#ffee88','#99ee99','#88bbff','#8899dd','#dd99ff',
    '#d4d4d4','#2e2e2e','#ff0000','#ff6600','#ffcc00','#00cc00','#0066ff','#1a3399','#8800cc',
    '#a0a0a0','#1a1a1a','#cc0000','#cc5200','#cc9900','#009900','#0044cc','#112266','#660099',
    '#555555','#000000','#880000','#883300','#886600','#006600','#002299','#001144','#440066',
];
const PALETTE_STD = [
    '#c00000','#ff0000','#ff6600','#ffcc00','#92d050','#00b050','#00b0f0','#0066ff','#002060','#7030a0',
];

let savedSel = null;

function initPalette() {
    const theme = document.getElementById('paletteTheme');
    const std   = document.getElementById('paletteStd');
    PALETTE_THEME.forEach(c => theme.appendChild(makePaletteSwatch(c)));
    PALETTE_STD.forEach(c   => std.appendChild(makePaletteSwatch(c)));
}

function makePaletteSwatch(color) {
    const d = document.createElement('div');
    d.className = 'palette-swatch';
    d.style.background = color;
    d.title = color;
    if (color === '#ffffff' || color === '#f2f2f2') d.style.border = '1px solid #ccc';
    d.addEventListener('click', () => applyHighlight(color));
    return d;
}

function togglePalette(e) {
    e.stopPropagation();
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedSel = sel.getRangeAt(0).cloneRange();
    const wrap = document.getElementById('colorPaletteWrap');
    wrap.classList.toggle('open');
}

function closePalette() {
    document.getElementById('colorPaletteWrap').classList.remove('open');
}

function applyHighlight(color) {
    closePalette();
    saveState();
    if (savedSel) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedSel);
    }
    document.execCommand('hiliteColor', false, color);
    autoSave();
}

document.addEventListener('click', e => {
    if (!e.target.closest('#colorPaletteWrap')) closePalette();
});

// ================================================================
//  CONTEXT MENU
// ================================================================
let ctxTargetId = null;

function showCtxMenu(e, id) {
    e.preventDefault();
    e.stopPropagation();
    ctxTargetId = id;
    const menu = document.getElementById('ctx-menu');
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
    requestAnimationFrame(() => {
        const r = menu.getBoundingClientRect();
        if (r.right  > window.innerWidth)  menu.style.left = (e.clientX - r.width)  + 'px';
        if (r.bottom > window.innerHeight) menu.style.top  = (e.clientY - r.height) + 'px';
    });
}

function hideCtxMenu() {
    document.getElementById('ctx-menu').style.display = 'none';
    ctxTargetId = null;
}

function startInlineRename(id) {
    const item = findItem(id);
    if (!item) return;
    const titleEl = document.querySelector(`.deck-item[data-id="${id}"] .item-title`);
    if (!titleEl) return;
    titleEl.contentEditable = 'true';
    titleEl.style.outline = 'none';
    titleEl.focus();
    const range = document.createRange();
    range.selectNodeContents(titleEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    const finish = () => {
        titleEl.contentEditable = 'false';
        const newTitle = titleEl.textContent.trim();
        item.title = newTitle || item.title;
        persist();
        renderSidebar();
        if (currentFileId === id) document.getElementById('title-input').value = item.title;
    };
    titleEl.addEventListener('blur', finish, { once: true });
    titleEl.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); titleEl.blur(); }
        if (e.key === 'Escape') { titleEl.textContent = item.title; titleEl.blur(); }
    });
}

function ctxRename() {
    const id = ctxTargetId;
    hideCtxMenu();
    startInlineRename(id);
}

function ctxDelete() {
    const id = ctxTargetId;
    hideCtxMenu();
    handleDeleteItem(id);
}

document.addEventListener('click',       e => { if (!e.target.closest('#ctx-menu')) hideCtxMenu(); });
document.addEventListener('contextmenu', e => { if (!e.target.closest('.deck-item')) hideCtxMenu(); });

// ================================================================
//  FONT SIZE
// ================================================================
function applyFontSize(v) {
    if (!v) return;
    document.execCommand('fontSize', false, v);
    // Fix #7: after resizing, re-sync line-height on highlight spans
    // so the background colour stretches to match the new font size
    const sizeMap = {'1':14,'2':18,'3':22,'4':26,'5':34,'6':44,'7':62};
    const lh = sizeMap[v];
    if (lh) {
        document.querySelectorAll('.input-area span[style*="background-color"]').forEach(span => {
            span.style.lineHeight = lh + 'px';
            span.style.display = 'inline';
        });
        // also handle font elements inside highlight spans
        document.querySelectorAll('.input-area font').forEach(font => {
            const hl = font.closest('span[style*="background-color"]');
            if (hl) { hl.style.lineHeight = lh + 'px'; hl.style.display = 'inline'; }
        });
    }
    document.getElementById('font-size-select').value = '';
    autoSave();
}

// ================================================================
//  MODAL
// ================================================================
function showModal(msg, buttons) {
    document.getElementById('modal-msg').textContent = msg;
    const actions = document.getElementById('modal-actions');
    actions.innerHTML = '';
    buttons.forEach(btn => {
        const b = document.createElement('button');
        b.className = `m-btn ${btn.cls}`; b.textContent = btn.label;
        b.addEventListener('click', btn.fn); actions.appendChild(b);
    });
    document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

// ================================================================
//  PWA
// ================================================================
let _deferredInstallPrompt = null;

function initPWA() {
    // ── Icon SVG (tree shape) ──
    const iconSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
        <rect width='100' height='100' rx='20' fill='%231a1a1a'/>
        <rect x='14' y='24' width='28' height='18' rx='4' fill='white' opacity='.95'/>
        <rect x='58' y='10' width='28' height='16' rx='4' fill='white' opacity='.85'/>
        <rect x='58' y='34' width='28' height='16' rx='4' fill='white' opacity='.85'/>
        <rect x='58' y='58' width='28' height='16' rx='4' fill='white' opacity='.85'/>
        <rect x='58' y='74' width='28' height='16' rx='4' fill='white' opacity='.85'/>
        <line x1='42' y1='33' x2='52' y2='18' stroke='%23aaa' stroke-width='2.5' stroke-linecap='round'/>
        <line x1='42' y1='33' x2='52' y2='42' stroke='%23aaa' stroke-width='2.5' stroke-linecap='round'/>
        <line x1='42' y1='33' x2='52' y2='66' stroke='%23aaa' stroke-width='2.5' stroke-linecap='round'/>
        <line x1='42' y1='33' x2='52' y2='82' stroke='%23aaa' stroke-width='2.5' stroke-linecap='round'/>
        <line x1='52' y1='18' x2='52' y2='82' stroke='%23aaa' stroke-width='2' opacity='.4'/>
    </svg>`;
    const iconUrl = `data:image/svg+xml,${iconSvg}`;

    // ── Web App Manifest (blob URL) ──
    const manifest = {
        name: 'LogicArch',
        short_name: 'LogicArch',
        description: 'Hierarchical tree diagram editor',
        start_url: '.',
        display: 'standalone',
        background_color: '#ffffff',
        theme_color: '#1a1a1a',
        icons: [
            { src: iconUrl, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
            { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
        ]
    };
    try {
        const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const mLink = document.createElement('link');
        mLink.rel = 'manifest'; mLink.href = URL.createObjectURL(mBlob);
        document.head.appendChild(mLink);
    } catch(e) {}

    // ── Apple touch icon ──
    try {
        const appleLink = document.createElement('link');
        appleLink.rel = 'apple-touch-icon'; appleLink.href = iconUrl;
        document.head.appendChild(appleLink);
    } catch(e) {}

    // ── Service Worker (cache → offline support) ──
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'logicarch-v1';
            self.addEventListener('install', e => {
                self.skipWaiting();
            });
            self.addEventListener('activate', e => {
                e.waitUntil(clients.claim());
            });
            self.addEventListener('fetch', e => {
                // Cache html2canvas CDN; network-first for everything else
                if (e.request.url.includes('html2canvas')) {
                    e.respondWith(
                        caches.open(CACHE_NAME).then(cache =>
                            cache.match(e.request).then(cached => {
                                if (cached) return cached;
                                return fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; });
                            })
                        )
                    );
                }
            });
        `;
        try {
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl  = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        } catch(e) {}
    }

    // ── Detect install prompt → show button ──
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        _deferredInstallPrompt = e;
        const btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = '';
    });

    window.addEventListener('appinstalled', () => {
        _deferredInstallPrompt = null;
        const btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = 'none';
    });
}

function pwsInstall() {
    if (!_deferredInstallPrompt) return;
    _deferredInstallPrompt.prompt();
    _deferredInstallPrompt.userChoice.then(() => { _deferredInstallPrompt = null; });
}

// ================================================================
//  START
// ================================================================
window.onload = init;
</script>
